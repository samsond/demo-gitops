# Git credentials for Kargo to push promotion commits.
#
# IMPORTANT: Do NOT commit this file with a real token.
# Replace the placeholder values, apply to the cluster, then delete the local copy
# or add this file to .gitignore.
#
# Required GitHub token scopes:
#   Public repo:  public_repo
#   Private repo: repo
#
# Create a token at: https://github.com/settings/tokens
apiVersion: v1
kind: Secret
metadata:
  name: demo-git-creds
  namespace: demo
  labels:
    kargo.akuity.io/cred-type: git
stringData:
  repoURL: https://github.com/kargobook/demo-gitops.git
  username: kargobook
  password: YOUR_GITHUB_TOKEN
