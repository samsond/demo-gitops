        - uses: git-commit
          config:
            path: ./repo
            message: "promote payments to staging: ${{ freight.image.tag }}"
        - uses: git-push
          config:
            path: ./repo
            targetBranch: main
---
apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: payments-prod
  namespace: kargobook-demo
spec:
  requestedFreight:
    - origin:
        kind: Warehouse
        name: payments-warehouse
