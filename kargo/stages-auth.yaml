        - uses: git-commit
          config:
            path: ./repo
            message: "promote auth to staging: ${{ freight.image.tag }}"
        - uses: git-push
          config:
            path: ./repo
            targetBranch: main
---
apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: auth-prod
  namespace: kargobook-demo
spec:
  requestedFreight:
    - origin:
        kind: Warehouse
        name: auth-warehouse
      sources:
        stages:
          - auth-staging
  promotionTemplate:
    spec:
      steps:
        - uses: git-clone
          config:
            repoURL: https://github.com/kargobook/demo-gitops.git
            checkout:
