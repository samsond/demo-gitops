apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: payments-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/kargobook/demo-gitops.git
    targetRevision: main
    path: apps/payments/envs/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: payments-dev
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace=true
